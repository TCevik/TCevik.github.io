<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Overhoor App - Compleet</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <h1>Overhoor App</h1>

    <button id="loginBtn">Inloggen met Google</button>

    <div id="userSection" style="display:none;">
        <p>Huidige gebruikersnaam: <strong id="displayUser">...</strong></p>
        <input type="text" id="usernameInput" placeholder="Nieuwe naam invullen">
        <button id="saveBtn">Naam opslaan in Drive</button>
    </div>

    <pre id="status"></pre>

    <script>
        const CLIENT_ID = '793882705601-59defi70hs2e9lc9n6adgnt10q5s0mht.apps.googleusercontent.com';
        const SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
        
        let tokenClient;
        let accessToken = null;

        window.onload = () => {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPE,
                callback: (resp) => {
                    accessToken = resp.access_token;
                    document.getElementById('loginBtn').style.display = 'none';
                    document.getElementById('userSection').style.display = 'block';
                    loadUserData();
                }
            });
        };

        document.getElementById('loginBtn').onclick = () => tokenClient.requestAccessToken();

        // Data ophalen bij start
        async function loadUserData() {
            const listResp = await fetch('https://www.googleapis.com/drive/v3/files?q=name="userdata.json"&spaces=appDataFolder', {
                headers: { 'Authorization': 'Bearer ' + accessToken }
            });
            const list = await listResp.json();

            if (list.files && list.files.length > 0) {
                const fileId = list.files[0].id;
                const fileResp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                    headers: { 'Authorization': 'Bearer ' + accessToken }
                });
                const data = await fileResp.json();
                document.getElementById('displayUser').innerText = data.username;
            } else {
                document.getElementById('displayUser').innerText = "Nog geen naam ingesteld.";
            }
        }

        // Data opslaan/updaten
        document.getElementById('saveBtn').onclick = async () => {
            const username = document.getElementById('usernameInput').value;
            if (!username) { alert("Vul een naam in!"); return; }

            const fileData = { username: username };
            const blob = new Blob([JSON.stringify(fileData)], { type: 'application/json' });

            const listResp = await fetch('https://www.googleapis.com/drive/v3/files?q=name="userdata.json"&spaces=appDataFolder', {
                headers: { 'Authorization': 'Bearer ' + accessToken }
            });
            const list = await listResp.json();

            if (list.files && list.files.length > 0) {
                // Bestaat al: Update
                const fileId = list.files[0].id;
                await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify(fileData)
                });
                document.getElementById('status').innerText = "Naam bijgewerkt in Drive!";
            } else {
                // Bestaat niet: Aanmaken
                const meta = { name: 'userdata.json', parents: ['appDataFolder'] };
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
                form.append('file', blob);

                await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + accessToken },
                    body: form
                });
                document.getElementById('status').innerText = "Naam opgeslagen in nieuw bestand!";
            }
            document.getElementById('displayUser').innerText = username;
        };
    </script>
</body>
</html>
