<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinkelFix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" href="assets/winkelfix/winkelfix-favicon.png" type="image/x-icon">

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap');

        :root {
            /* Originele kleuren - NIET GEWIJZIGD */
            --bg-color: #f8f9fa;
            --text-color: #333;
            --header-bg: #01abe8;
            --header-text: white;
            --card-bg: white;
            --card-shadow: rgba(0, 0, 0, 0.05);
            --input-border: #ddd;
            --input-bg: white;
            --btn-primary: #01abe8;
            --btn-success: #28a745;
            --modal-bg: white;
            --modal-overlay: rgba(0, 0, 0, 0.5);
            --secondary-text: #888;
            --accent-color: #01abe8;
            --toast-bg: #333;
            --toast-text: #fff;
            --filter-pill-bg: #eee;
            --filter-pill-text: #555;
            --drag-handle: #ddd;
        }

        :root[data-theme='dark'] {
            /* Originele dark mode kleuren - NIET GEWIJZIGD */
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --header-bg: #1f1f1f;
            --header-text: #01abe8;
            --card-bg: #1e1e1e;
            --card-shadow: rgba(0, 0, 0, 0.3);
            --input-border: #333;
            --input-bg: #2d2d2d;
            --btn-primary: #01abe8;
            --btn-success: #2e7d32;
            --modal-bg: #252525;
            --modal-overlay: rgba(0, 0, 0, 0.7);
            --secondary-text: #aaa;
            --accent-color: #01abe8;
            --toast-bg: #01abe8;
            --toast-text: #fff;
            --filter-pill-bg: #333;
            --filter-pill-text: #ccc;
            --drag-handle: #444;
        }

        * {
            font-family: 'Lexend', sans-serif;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        body {
            margin: 0;
            padding: 85px 0 90px 0;
            /* Ruimte voor header en bottom nav */
            background-color: var(--bg-color);
            color: var(--text-color);
            -webkit-user-select: none;
            user-select: none;
            overflow-x: hidden;
        }

        input,
        textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        /* --- Vernieuwde Header (Zwevend) --- */
        header {
            position: fixed;
            top: 15px;
            left: 15px;
            right: 15px;
            height: 60px;
            border-radius: 20px;
            background-color: var(--header-bg);
            box-shadow: 0 4px 15px var(--card-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: var(--header-text);
            z-index: 1000;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        header #title {
            font-size: 22px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        header i {
            font-size: 22px;
            color: var(--header-text);
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }

        header i:active {
            transform: scale(0.9);
        }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: var(--card-bg);
            box-shadow: 0 -4px 20px var(--card-shadow);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--secondary-text);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            width: 33%;
            height: 100%;
            gap: 5px;
            transition: all 0.2s ease;
        }

        .nav-item i {
            font-size: 1.4rem;
            transition: transform 0.2s ease;
        }

        .nav-item.active {
            color: var(--accent-color);
        }

        .nav-item.active i {
            transform: translateY(-3px);
        }

        /* --- Screens --- */
        .screen {
            display: none;
            padding: 0 20px;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #home {
            display: block;
        }

        /* --- Vernieuwd Dashboard (Home) --- */
        .dash-header {
            margin-bottom: 25px;
            padding-top: 10px;
        }

        .dash-header h1 {
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            color: var(--accent-color);
        }

        .dash-header p {
            margin: 0;
            color: var(--secondary-text);
        }

        .dash-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .dash-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 6px 15px var(--card-shadow);
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .dash-card:active {
            transform: scale(0.97);
        }

        .dash-card i {
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 15px;
        }

        .dash-card h3 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-color);
            font-weight: 600;
        }

        .dash-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: var(--accent-color);
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* --- Scanner --- */
        #reader-container {
            margin-bottom: 20px;
        }

        #reader {
            width: 100%;
            max-width: 100%;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 8px 25px var(--card-shadow);
            border: 4px solid var(--card-bg);
        }

        .barcode-view-area {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 30px 20px;
            box-shadow: 0 8px 25px var(--card-shadow);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .barcode-view-area h2 {
            color: var(--accent-color);
            margin: 0 0 20px 0;
            font-size: 1.5rem;
        }

        .snapshot-preview {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 6px 15px var(--card-shadow);
            margin-bottom: 25px;
            border: 4px solid var(--bg-color);
        }

        /* FIX: Altijd witte achtergrond zodat laser scanners dit kunnen lezen in dark mode */
        .barcode-svg-wrapper {
            background-color: #ffffff;
            padding: 15px;
            border-radius: 15px;
            width: 100%;
            max-width: 350px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.05);
        }

        .barcode-svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            width: 100%;
        }

        .action-btn {
            flex: 1;
            padding: 16px;
            background-color: var(--btn-primary);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(1, 171, 232, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        .save-btn {
            background-color: var(--btn-success);
            box-shadow: 0 6px 15px rgba(40, 167, 69, 0.3);
        }

        /* --- Mijn Barcodes --- */
        .page-title {
            color: var(--accent-color);
            font-size: 1.6rem;
            margin: 0 0 20px 0;
            font-weight: 700;
        }

        .controls-section {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px var(--card-shadow);
        }

        .search-container {
            position: relative;
            margin-bottom: 15px;
        }

        .search-container input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid var(--input-border);
            border-radius: 18px;
            font-size: 1rem;
            background-color: var(--input-bg);
            color: var(--text-color);
            outline: none;
        }

        .search-container input:focus {
            border-color: var(--accent-color);
        }

        .search-container i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary-text);
            font-size: 1.1rem;
        }

        .action-row {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        .import-btn {
            flex: 1;
            padding: 12px;
            background-color: var(--btn-primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .import-btn.manual {
            background-color: #ffc107;
            color: #333;
        }

        .import-btn:active {
            filter: brightness(0.9);
            transform: scale(0.98);
        }

        .filter-container {
            display: flex;
            gap: 10px;
            padding-bottom: 5px;
            margin-bottom: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filter-container::-webkit-scrollbar {
            display: none;
        }

        .filter-pill {
            padding: 10px 20px;
            border-radius: 25px;
            background-color: var(--filter-pill-bg);
            color: var(--filter-pill-text);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            border: none;
        }

        .filter-pill.active {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 10px rgba(1, 171, 232, 0.3);
        }

        /* --- Vernieuwde Lijst --- */
        .barcode-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 20px;
        }

        .barcode-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 12px var(--card-shadow);
            position: relative;
        }

        .drag-handle {
            color: var(--drag-handle);
            padding: 10px;
            font-size: 1.2rem;
            cursor: grab;
            display: flex;
            align-items: center;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .barcode-card img {
            width: 75px;
            height: 75px;
            object-fit: cover;
            border-radius: 15px;
            margin: 0 15px 0 5px;
            background-color: var(--bg-color);
        }

        .barcode-card .info {
            cursor: pointer;
            flex-grow: 1;
            padding-right: 10px;
        }

        .barcode-card .info h3 {
            margin: 0 0 4px 0;
            color: var(--text-color);
            font-size: 1.1rem;
            font-weight: 600;
            word-break: break-word;
        }

        .barcode-card .info p {
            margin: 0;
            color: var(--secondary-text);
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .barcode-card .info .sub-code {
            color: var(--accent-color);
            font-weight: 600;
            background: var(--bg-color);
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            display: inline-block;
            margin-bottom: 4px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 10px;
            border-left: 1px solid var(--input-border);
        }

        .icon-btn {
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
        }

        .edit-btn {
            background: #ffc107;
            color: #333;
        }

        .delete-btn {
            background: #ff4d4d;
        }

        .icon-btn:active {
            transform: scale(0.9);
        }

        /* --- Modals (Bottom Sheet/Sleek style) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--modal-overlay);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            /* Nu komen ze strak van onder (mobile first) */
            z-index: 4000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s;
            padding: 20px;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: var(--modal-bg);
            padding: 30px 25px;
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.show .modal-box {
            transform: translateY(0);
        }

        /* Center modal for desktop viewing logic */
        @media (min-width: 600px) {
            .modal-overlay {
                align-items: center;
            }

            .modal-box {
                border-radius: 25px;
                transform: scale(0.9) translateY(20px);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            }

            .modal-overlay.show .modal-box {
                transform: scale(1) translateY(0);
            }
        }

        .modal-box h3 {
            margin: 0 0 15px 0;
            color: var(--text-color);
            font-size: 1.4rem;
        }

        .modal-box p {
            margin: 0 0 25px 0;
            color: var(--secondary-text);
            line-height: 1.5;
        }

        .modal-input,
        .modal-select {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--input-border);
            border-radius: 18px;
            font-size: 1rem;
            background-color: var(--input-bg);
            color: var(--text-color);
            margin-bottom: 20px;
            outline: none;
        }

        .modal-input:focus,
        .modal-select:focus {
            border-color: var(--accent-color);
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 20px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
        }

        .cancel-btn {
            background: var(--filter-pill-bg);
            color: var(--filter-pill-text);
        }

        .ok-btn {
            background: var(--btn-primary);
            color: white;
            box-shadow: 0 4px 12px rgba(1, 171, 232, 0.3);
        }

        /* --- Toast --- */
        #toast-container {
            position: fixed;
            top: 90px;
            /* Toast van boven ipv onder ivm bottom nav */
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            width: 90%;
            max-width: 400px;
        }

        .toast-msg {
            background-color: var(--toast-bg);
            color: var(--toast-text);
            text-align: center;
            border-radius: 20px;
            padding: 14px 20px;
            font-weight: 500;
            font-size: 0.95rem;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .toast-msg.show {
            opacity: 1;
            transform: translateY(0);
        }

        .no-transition * {
            transition: none !important;
        }

        /* --- Side Menu (Main Menu) --- */
        .side-menu {
            position: fixed;
            top: 0;
            left: -285px;
            width: 285px;
            height: 100%;
            background: var(--modal-bg);
            z-index: 3000;
            transition: left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .side-menu.open {
            left: 0;
        }

        .menu-header {
            padding: 25px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--header-bg);
            color: var(--header-text);
        }

        .menu-header h3 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .menu-header i {
            font-size: 1.5rem;
            cursor: pointer;
        }

        .menu-content {
            padding: 20px 0;
            flex-grow: 1;
        }

        .menu-section-title {
            padding: 10px 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--secondary-text);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .menu-item {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            color: var(--text-color);
            font-weight: 500;
            transition: background 0.2s;
        }

        .menu-item:active {
            background: var(--bg-color);
        }

        .menu-item i {
            font-size: 1.3rem;
            color: var(--accent-color);
            width: 25px;
            text-align: center;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
        }

        .menu-overlay.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
    <script>
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const toggleIcon = document.getElementById('theme-toggle');
            if (toggleIcon) {
                if (theme === 'dark') {
                    toggleIcon.classList.remove('fa-moon');
                    toggleIcon.classList.add('fa-sun');
                } else {
                    toggleIcon.classList.remove('fa-sun');
                    toggleIcon.classList.add('fa-moon');
                }
            }
            localStorage.setItem('theme', theme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            applyTheme(newTheme);
        }

        (function () {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            const theme = savedTheme || systemTheme;
            document.documentElement.setAttribute('data-theme', theme);

            document.documentElement.classList.add('no-transition');
            window.addEventListener('load', () => {
                const toggleIcon = document.getElementById('theme-toggle');
                if (toggleIcon) {
                    if (theme === 'dark') {
                        toggleIcon.classList.remove('fa-moon');
                        toggleIcon.classList.add('fa-sun');
                    }
                }
                setTimeout(() => document.documentElement.classList.remove('no-transition'), 100);
            });
        })();
    </script>
</head>

<body>
    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <i class="fa-solid fa-bars" id="menu-toggle" onclick="toggleMenu()"
                style="background: none; box-shadow: none; padding: 5px;"></i>
            <p id="title">WinkelFix</p>
        </div>
        <div>
            <i class="fa-solid fa-moon" id="theme-toggle" onclick="toggleTheme()"></i>
        </div>
    </header>

    <!-- Side Menu -->
    <div id="side-menu" class="side-menu">
        <div class="menu-header">
            <h3>Menu</h3>
            <i class="fa-solid fa-xmark" onclick="toggleMenu()"></i>
        </div>
        <div class="menu-content">
            <div class="menu-section-title">Data Beheer</div>
            <div class="menu-item" onclick="exportData()">
                <i class="fa-solid fa-file-export"></i>
                <span>Alles Exporteren (JSON)</span>
            </div>
            <div class="menu-item" onclick="document.getElementById('import-file').click()">
                <i class="fa-solid fa-file-import"></i>
                <span>Alles Importeren (JSON)</span>
            </div>
            <input type="file" id="import-file" style="display: none" accept=".json" onchange="handleImportFile(event)">
        </div>
        <div
            style="padding: 20px; font-size: 0.8rem; color: var(--secondary-text); text-align: center; border-top: 1px solid var(--input-border);">
            WinkelFix v1.5
        </div>
    </div>
    <div id="menu-overlay" class="menu-overlay" onclick="toggleMenu()"></div>

    <!-- App Content Screens -->
    <div class="screen" id="home">
        <div class="dash-header">
            <h1>Welkom!</h1>
            <p>Wat wil je vandaag doen?</p>
        </div>

        <div class="dash-grid">
            <div class="dash-card" onclick="navigate('scan-naar-scherm')">
                <i class="fa-solid fa-expand"></i>
                <h3>Scan Barcode</h3>
            </div>
            <div class="dash-card" onclick="navigate('mijn-barcodes')">

    <script>
        let db;
        const request = indexedDB.open("WinkelFixDB", 1);

        request.onupgradeneeded = function (event) {
            db = event.target.result;
            if (!db.objectStoreNames.contains("barcodes")) {
                db.createObjectStore("barcodes", { keyPath: "id", autoIncrement: true });
            }
        };

        request.onsuccess = function (event) {
            db = event.target.result;
            updateDashboardStats();
        };

        request.onerror = function (event) {
            console.error("IndexedDB error:", event.target.errorCode);
        };

        let html5QrCode;
        let currentBarcodeText = "";
        let currentSnapshotBase64 = "";
        let isImportedPhoto = false;
        let sortableInstance = null;
        let currentCategoryFilter = 'alles';
        let categoryModalResolver = null;

        // --- Navigation Logic ---
        function navigate(screenId, preventCamera = false) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => s.style.display = 'none');

            const target = document.getElementById(screenId);
            if (target) target.style.display = 'block';

            // Update Bottom Nav Active State
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            if (screenId === 'home') document.getElementById('nav-home').classList.add('active');
            if (screenId === 'scan-naar-scherm') document.getElementById('nav-scan').classList.add('active');
            if (screenId === 'mijn-barcodes' || screenId === 'bekijk-barcode-scherm') document.getElementById('nav-list').classList.add('active');

            if (screenId === 'scan-naar-scherm' && !preventCamera) {
                startScanner();
            } else if (screenId !== 'scan-naar-scherm') {
                stopScanner();
            }

            if (screenId === 'mijn-barcodes') {
                document.getElementById('search-input').value = "";
                loadMijnBarcodes();
            }

            if (screenId === 'home') {
                updateDashboardStats();
            }
        }

        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('menu-overlay');
            if (!menu || !overlay) return;
            menu.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        function exportData() {
            if (!db) return showToast("Fout: Database niet geladen.");

            const transaction = db.transaction(["barcodes"], "readonly");
            const store = transaction.objectStore("barcodes");
            const request = store.getAll();

            request.onsuccess = function () {
                const data = {
                    barcodes: request.result,
                    order: JSON.parse(localStorage.getItem('winkelFixOrder') || "[]"),
                    theme: localStorage.getItem('theme') || 'light',
                    version: "1.5",
                    exportedAt: new Date().toISOString()
                };

                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `winkelfix-export-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showToast("Data succesvol geëxporteerd!");
                toggleMenu();
            };
        }

        async function handleImportFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            toggleMenu(); // Sidebar dicht na selecteren bestand

            const reader = new FileReader();
            reader.onload = async function (e) {
                try {
                    const jsonData = JSON.parse(e.target.result);
                    if (!jsonData.barcodes || !Array.isArray(jsonData.barcodes)) {
                        throw new Error("Ongeldig WinkelFix bestand.");
                    }

                    const confirm = await AppModal.confirm(
                        `Weet je zeker dat je ${jsonData.barcodes.length} barcodes wilt importeren? Dit overschrijft je huidige data.`,
                        "Data Importeren"
                    );

                    if (confirm) {
                        await importDataIntoDB(jsonData);
                    }
                } catch (err) {
                    AppModal.alert("Fout bij het laden van bestand: " + err.message, "Import Fout");
                } finally {
                    event.target.value = '';
                }
            };
            reader.readAsText(file);
        }

        async function importDataIntoDB(data) {
            if (!db) return showToast("Fout: Database niet geladen.");

            const tx = db.transaction(["barcodes"], "readwrite");
            const store = tx.objectStore("barcodes");

            const clearReq = store.clear();

            clearReq.onsuccess = function () {
                data.barcodes.forEach(item => {
                    store.put(item);
                });

                tx.oncomplete = function () {
                    if (data.order) {
                        localStorage.setItem('winkelFixOrder', JSON.stringify(data.order));
                    }
                    if (data.theme) {
                        applyTheme(data.theme);
                    }

                    showToast(`${data.barcodes.length} barcodes succesvol geïmporteerd!`);
                    loadMijnBarcodes();
                    updateDashboardStats();

                    // Terug naar home om stats te zien
                    navigate('home');
                };
            };

            clearReq.onerror = function () {
                showToast("Fout bij het wissen van oude data.");
            };
        }

        function updateDashboardStats() {
            if (!db) return;
            const transaction = db.transaction(["barcodes"], "readonly");
            const store = transaction.objectStore("barcodes");
            const request = store.count();
            request.onsuccess = function () {
                document.getElementById('dash-count').innerText = request.result;
            }
        }

        // --- Modals ---
        function showCategoryModal() {
            document.getElementById('cat-modal-select').value = 'geen';
            document.getElementById('cat-modal-custom').value = '';
            document.getElementById('cat-modal-custom').style.display = 'none';
            document.getElementById('category-modal-overlay').classList.add('show');
            return new Promise(resolve => {
                categoryModalResolver = resolve;
            });
        }

        function resolveCategoryModal(val) {
            document.getElementById('category-modal-overlay').classList.remove('show');
            if (categoryModalResolver) {
                categoryModalResolver(val);
                categoryModalResolver = null;
            }
        }

        function resolveCategoryModalValue() {
            let cat = document.getElementById('cat-modal-select').value;
            if (cat === 'aangepast') {
                cat = document.getElementById('cat-modal-custom').value.trim().toLowerCase();
                if (!cat) cat = 'geen';
            }
            resolveCategoryModal(cat);
        }

        function toggleCatModalCustom() {
            const select = document.getElementById('cat-modal-select');
            const custom = document.getElementById('cat-modal-custom');
            if (select.value === 'aangepast') {
                custom.style.display = 'block';
                custom.focus();
            } else {
                custom.style.display = 'none';
            }
        }

        const AppModal = {
            show(options) {
                return new Promise((resolve) => {
                    const overlay = document.getElementById('custom-modal-overlay');
                    const titleEl = document.getElementById('modal-title');
                    const msgEl = document.getElementById('modal-msg');
                    const inputEl = document.getElementById('modal-input');
                    const okBtn = document.getElementById('modal-ok-btn');
                    const cancelBtn = document.getElementById('modal-cancel-btn');

                    titleEl.innerText = options.title || "Melding";

                    if (options.message) {
                        msgEl.innerText = options.message;
                        msgEl.style.display = 'block';
                    } else {
                        msgEl.style.display = 'none';
                    }

                    if (options.type === 'prompt') {
                        inputEl.style.display = 'block';
                        inputEl.value = options.defaultValue || "";
                        setTimeout(() => inputEl.focus(), 100);
                    } else {
                        inputEl.style.display = 'none';
                    }

                    if (options.type === 'alert') {
                        cancelBtn.style.display = 'none';
                    } else {
                        cancelBtn.style.display = 'block';
                        cancelBtn.innerText = options.cancelText || "Annuleren";
                    }

                    okBtn.innerText = options.okText || "OK";

                    overlay.classList.add('show');

                    const cleanup = () => {
                        overlay.classList.remove('show');
                        okBtn.onclick = null;
                        cancelBtn.onclick = null;
                        inputEl.onkeydown = null;
                    };

                    okBtn.onclick = () => {
                        cleanup();
                        if (options.type === 'prompt') resolve(inputEl.value);
                        else resolve(true);
                    };

                    cancelBtn.onclick = () => {
                        cleanup();
                        resolve(null);
                    };

                    inputEl.onkeydown = (e) => {
                        if (e.key === "Enter") {
                            okBtn.click();
                        }
                    };
                });
            },
            alert(message, title = "Melding") { return this.show({ type: 'alert', title, message }); },
            confirm(message, title = "Bevestigen") { return this.show({ type: 'confirm', title, message }); },
            prompt(message, defaultValue = "", title = "Invoer") { return this.show({ type: 'prompt', title, message, defaultValue }); }
        };

        function showToast(message) {
            let container = document.getElementById("toast-container");
            if (!container) {
                container = document.createElement("div");
                container.id = "toast-container";
                document.body.appendChild(container);
            }

            const toast = document.createElement("div");
            toast.className = "toast-msg";
            toast.innerText = message;

            container.prepend(toast);
            setTimeout(() => toast.classList.add("show"), 10);

            setTimeout(() => {
                toast.classList.remove("show");
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // --- Scanner Functions ---
        function startScanner() {
            isImportedPhoto = false;
            document.getElementById('reader-container').style.display = 'block';
            document.getElementById('barcode-result').style.display = 'none';
            document.getElementById('snapshot-preview').style.display = 'none';

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 150 } },
                onScanSuccess
            ).catch(err => {
                console.error("Camera kon niet starten:", err);
                showToast("Kan camera niet starten. Controleer permissies!");
            });
        }

        function onScanSuccess(decodedText, decodedResult) {
            currentBarcodeText = decodedText;
            playScanBeep();

            const videoElement = document.querySelector("#reader video");
            if (videoElement) {
                const canvas = document.createElement("canvas");
                canvas.width = videoElement.videoWidth;
                canvas.height = videoElement.videoHeight;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                currentSnapshotBase64 = canvas.toDataURL("image/jpeg", 0.7);
            }

            stopScanner().then(() => {
                document.getElementById('reader-container').style.display = 'none';
                document.getElementById('barcode-result').style.display = 'flex';

                const previewImg = document.getElementById('snapshot-preview');
                if (currentSnapshotBase64) {
                    previewImg.src = currentSnapshotBase64;
                    previewImg.style.display = 'block';
                }

                JsBarcode("#barcode", decodedText, {
                    format: "CODE128", lineColor: "#000000", background: "#ffffff", width: 3, height: 100,
                    displayValue: true, font: "Lexend", fontSize: 20, fontOptions: "bold", textMargin: 10
                });
            });
        }

        function playScanBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(2800, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch (e) {
                console.warn("Geluids-API werkt niet in deze browser", e);
            }
        }

        function stopScanner() {
            return new Promise((resolve) => {
                if (html5QrCode && html5QrCode.isScanning) {
                    html5QrCode.stop().then(resolve).catch(err => resolve());
                } else {
                    resolve();
                }
            });
        }

        function resetScanner() {
            currentBarcodeText = "";
            currentSnapshotBase64 = "";
            if (isImportedPhoto) {
                isImportedPhoto = false;
                navigate('mijn-barcodes');
            } else {
                startScanner();
            }
        }

        function resizeImageFile(file, callback) {
            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new Image();
                img.onload = function () {
                    const canvas = document.createElement("canvas");
                    const MAX_WIDTH = 500;
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) {
                        height = Math.round(height * (MAX_WIDTH / width));
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL("image/jpeg", 0.7));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            showToast("Foto analyseren op barcodes...");
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

            html5QrCode.scanFile(file, true)
                .then(decodedText => {
                    resizeImageFile(file, function (base64) {
                        currentSnapshotBase64 = base64;
                        currentBarcodeText = decodedText;
                        isImportedPhoto = true;

                        stopScanner().then(() => {
                            navigate('scan-naar-scherm', true);
                            document.getElementById('reader-container').style.display = 'none';
                            document.getElementById('barcode-result').style.display = 'flex';

                            const previewImg = document.getElementById('snapshot-preview');
                            previewImg.src = currentSnapshotBase64;
                            previewImg.style.display = 'block';

                            JsBarcode("#barcode", decodedText, {
                                format: "CODE128", lineColor: "#000000", background: "#ffffff", width: 3, height: 100,
                                displayValue: true, font: "Lexend", fontSize: 20, fontOptions: "bold", textMargin: 10
                            });

                            showToast("Barcode gevonden! Klik op Opslaan.");
                        });
                    });
                })
                .catch(async err => {
                    const handmatigeCode = await AppModal.prompt("Geen barcode gevonden. Voer handmatig in:", "", "Handmatig");
                    if (handmatigeCode && handmatigeCode.trim() !== "") {
                        const handmatigeTitel = await AppModal.prompt("Titel (optioneel):", "", "Titel");
                        const catInfo = await showCategoryModal();
                        if (!catInfo) return;

                        resizeImageFile(file, function (base64) {
                            if (!db) return;
                            const tx = db.transaction(["barcodes"], "readwrite");
                            const req = tx.objectStore("barcodes").add({
                                code: handmatigeCode.trim(),
                                titel: handmatigeTitel ? handmatigeTitel.trim() : "",
                                image: base64,
                                datum: new Date().toLocaleString("nl-NL"),
                                categorie: catInfo
                            });
                            req.onsuccess = () => { showToast("Opgeslagen!"); loadMijnBarcodes(); updateDashboardStats(); };
                        });
                    }
                });
            event.target.value = '';
        }

        async function addManualBarcode() {
            if (!db) return;
            const handmatigeCode = await AppModal.prompt("Voer barcode in:", "", "Nieuwe Barcode");
            if (handmatigeCode && handmatigeCode.trim() !== "") {
                const handmatigeTitel = await AppModal.prompt("Titel (optioneel):", "", "Titel");
                const catInfo = await showCategoryModal();
                if (!catInfo) return;

                const tx = db.transaction(["barcodes"], "readwrite");
                const req = tx.objectStore("barcodes").add({
                    code: handmatigeCode.trim(),
                    titel: handmatigeTitel ? handmatigeTitel.trim() : "",
                    image: "",
                    datum: new Date().toLocaleString("nl-NL"),
                    categorie: catInfo
                });
                req.onsuccess = () => { showToast("Opgeslagen!"); loadMijnBarcodes(); updateDashboardStats(); };
            }
        }

        async function saveBarcodeToDB() {
            if (!db) return showToast("DB Error!");
            const categorieInfo = await showCategoryModal();
            if (!categorieInfo) return;

            const tx = db.transaction(["barcodes"], "readwrite");
            const req = tx.objectStore("barcodes").add({
                code: currentBarcodeText,
                titel: "",
                image: currentSnapshotBase64,
                datum: new Date().toLocaleString("nl-NL"),
                categorie: categorieInfo
            });
            req.onsuccess = () => { showToast("Succesvol opgeslagen!"); updateDashboardStats(); resetScanner(); };
        }

        function setCategoryFilter(category) {
            currentCategoryFilter = category;
            loadMijnBarcodes();
        }

        function renderFilterPills(allBarcodes) {
            const container = document.getElementById('category-filters');
            if (!container) return;

            const categories = new Set();
            allBarcodes.forEach(b => categories.add(b.categorie || 'geen'));

            const standardCategories = ['geen', 'coupon', 'product', 'medewerkerspas'];
            const allCategories = ['alles', ...standardCategories];
            categories.forEach(c => { if (!allCategories.includes(c)) allCategories.push(c); });

            container.innerHTML = '';
            allCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `filter-pill ${currentCategoryFilter === cat ? 'active' : ''}`;
                btn.onclick = () => setCategoryFilter(cat);
                btn.innerText = cat.charAt(0).toUpperCase() + cat.slice(1);
                container.appendChild(btn);
            });
        }

        function loadMijnBarcodes() {
            if (!db) return;
            const container = document.getElementById("barcode-list-container");
            const searchQuery = document.getElementById("search-input").value.toLowerCase();
            container.innerHTML = "";

            const tx = db.transaction(["barcodes"], "readonly");
            tx.objectStore("barcodes").getAll().onsuccess = function (e) {
                let barcodes = e.target.result;
                barcodes.forEach(b => { if (!b.categorie) b.categorie = 'geen'; });
                renderFilterPills(barcodes);

                if (currentCategoryFilter !== 'alles') {
                    barcodes = barcodes.filter(item => item.categorie === currentCategoryFilter);
                }
                if (searchQuery) {
                    barcodes = barcodes.filter(item => {
                        const tMatch = item.titel && item.titel.toLowerCase().includes(searchQuery);
                        const cMatch = item.code && item.code.toLowerCase().includes(searchQuery);
                        return tMatch || cMatch;
                    });
                }

                if (barcodes.length === 0) {
                    container.innerHTML = "<p style='text-align:center; color: var(--secondary-text); margin-top: 30px;'><i class='fa-solid fa-box-open' style='font-size: 3rem; margin-bottom: 10px; opacity:0.5'></i><br>Geen resultaten.</p>";
                    return;
                }

                let savedOrder = JSON.parse(localStorage.getItem('winkelFixOrder') || "[]");
                barcodes.sort((a, b) => {
                    let indexA = savedOrder.indexOf(a.id);
                    let indexB = savedOrder.indexOf(b.id);
                    if (indexA === -1 && indexB === -1) return b.id - a.id;
                    if (indexA === -1) return -1;
                    if (indexB === -1) return 1;
                    return indexA - indexB;
                });

                barcodes.forEach(item => {
                    const card = document.createElement("div");
                    card.className = "barcode-card";
                    card.dataset.id = item.id;
                    const imgSrc = item.image ? item.image : "https://static.vecteezy.com/system/resources/previews/026/529/438/non_2x/simple-red-cross-mark-icon-vector.jpg";
                    const displayTitel = item.titel ? item.titel : item.code;
                    const displayCodeHTML = item.titel ? `<span class="sub-code">#${item.code}</span>` : '';

                    card.innerHTML = `
                        <div class="drag-handle"><i class="fa-solid fa-grip-vertical"></i></div>
                        <img src="${imgSrc}" alt="Product foto">
                        <div class="info" onclick="openBekijkScherm(${item.id})">
                            <h3>${displayTitel}</h3>
                            ${displayCodeHTML}
                            <p>${item.categorie.charAt(0).toUpperCase() + item.categorie.slice(1)} • ${item.datum}</p>
                        </div>
                        <div class="action-buttons">
                            <button class="icon-btn edit-btn" onclick="editBarcode(${item.id})" title="Aanpassen"><i class="fa-solid fa-pen"></i></button>
                            <button class="icon-btn delete-btn" onclick="deleteBarcode(${item.id})" title="Verwijderen"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    `;
                    container.appendChild(card);
                });

                if (typeof Sortable !== 'undefined') {
                    if (sortableInstance) { sortableInstance.destroy(); sortableInstance = null; }
                    if (!searchQuery) {
                        sortableInstance = Sortable.create(container, {
                            handle: '.drag-handle', animation: 200, ghostClass: 'sortable-ghost',
                            onEnd: function () {
                                const newOrder = [];
                                document.querySelectorAll('.barcode-card').forEach(c => newOrder.push(parseInt(c.dataset.id)));
                                localStorage.setItem('winkelFixOrder', JSON.stringify(newOrder));
                            }
                        });
                    }
                }
            };
        }

        let editCurrentId = null;
        let editCurrentBase64 = "";

        function editBarcode(id) {
            if (!db) return;
            db.transaction(["barcodes"], "readonly").objectStore("barcodes").get(id).onsuccess = function (e) {
                const item = e.target.result;
                if (item) {
                    editCurrentId = id;
                    document.getElementById('edit-titel-input').value = item.titel || "";
                    const cat = item.categorie || "geen";
                    const select = document.getElementById('edit-categorie-select');
                    const custom = document.getElementById('edit-custom-categorie-input');

                    if (["geen", "coupon", "product", "medewerkerspas"].includes(cat)) {
                        select.value = cat; custom.style.display = 'none'; custom.value = '';
                    } else {
                        select.value = 'aangepast'; custom.style.display = 'block'; custom.value = cat;
                    }
                    editCurrentBase64 = item.image || "";
                    updateEditPhotoPreview();
                    document.getElementById('edit-modal-overlay').classList.add('show');
                }
            };
        }

        function updateEditPhotoPreview() {
            document.getElementById('edit-foto-preview').src = editCurrentBase64 || "https://static.vecteezy.com/system/resources/previews/026/529/438/non_2x/simple-red-cross-mark-icon-vector.jpg";
        }
        function removeEditPhoto() { editCurrentBase64 = ""; updateEditPhotoPreview(); }
        function handleEditImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            resizeImageFile(file, function (base64) { editCurrentBase64 = base64; updateEditPhotoPreview(); });
            event.target.value = '';
        }
        function toggleEditCustomCategory() {
            const select = document.getElementById('edit-categorie-select');
            const custom = document.getElementById('edit-custom-categorie-input');
            if (select.value === 'aangepast') { custom.style.display = 'block'; custom.focus(); } else { custom.style.display = 'none'; }
        }
        function closeEditModal() {
            document.getElementById('edit-modal-overlay').classList.remove('show');
            editCurrentId = null; editCurrentBase64 = "";
        }
        function saveEdit() {
            if (!db || editCurrentId === null) return;
            const newTitel = document.getElementById('edit-titel-input').value.trim();
            let editCat = document.getElementById('edit-categorie-select').value;
            if (editCat === 'aangepast') {
                editCat = document.getElementById('edit-custom-categorie-input').value.trim().toLowerCase();
                if (!editCat) editCat = 'geen';
            }
            const tx = db.transaction(["barcodes"], "readwrite");
            const store = tx.objectStore("barcodes");
            store.get(editCurrentId).onsuccess = function (e) {
                const item = e.target.result;
                if (item) {
                    item.titel = newTitel; item.categorie = editCat; item.image = editCurrentBase64;
                    store.put(item).onsuccess = function () {
                        closeEditModal(); loadMijnBarcodes(); showToast("Bijgewerkt!");
                    };
                }
            };
        }

        async function deleteBarcode(id) {
            if (!db) return;
            const confirm = await AppModal.confirm("Weet je zeker dat je deze wilt verwijderen?", "Verwijderen");
            if (confirm) {
                db.transaction(["barcodes"], "readwrite").objectStore("barcodes").delete(id).onsuccess = function () {
                    loadMijnBarcodes(); updateDashboardStats(); showToast("Verwijderd!");
                };
            }
        }

        function openBekijkScherm(id) {
            if (!db) return;
            db.transaction(["barcodes"], "readonly").objectStore("barcodes").get(id).onsuccess = function (e) {
                const item = e.target.result;
                if (item) {
                    document.getElementById("bekijk-titel").innerText = item.titel ? item.titel : "Gescande Code";
                    const snap = document.getElementById("bekijk-snapshot");
                    snap.src = item.image ? item.image : "https://static.vecteezy.com/system/resources/previews/026/529/438/non_2x/simple-red-cross-mark-icon-vector.jpg";
                    snap.style.display = "block";
                    JsBarcode("#bekijk-svg", item.code, {
                        format: "CODE128", lineColor: "#000000", background: "#ffffff", width: 3, height: 100,
                        displayValue: true, font: "Lexend", fontSize: 20, fontOptions: "bold", textMargin: 10
                    });
                    navigate("bekijk-barcode-scherm");
                }
            };
        }
    </script>
</body>
