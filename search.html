<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TC_tam Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #00ff66;
            --text-color: #ffffff;
            --text-muted: #a0a0a0;
            --danger-color: #ff3333;
            --edit-color: #00bfff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; 
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            /* Voorkomt blauwe highlight flits op mobiel tikken */
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
        }

        /* Top Bar met Weer & Tijd */
        header {
            width: 100%;
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            padding: 5px 10px;
            flex-wrap: wrap;
        }

        .header-widget {
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 102, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }

        .header-widget i {
            color: var(--accent-color);
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            margin: auto;
            padding: 10px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 25px;
            font-weight: 700;
        }

        h1 span {
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
        }

        .search-box {
            position: relative;
            margin-bottom: 35px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px;
            padding-right: 55px;
            background: var(--card-bg);
            border: 2px solid #333;
            border-radius: 30px;
            color: var(--text-color);
            font-size: 1.05rem;
            outline: none;
            transition: all 0.3s ease;
            user-select: text;
            -webkit-user-select: text;
            -moz-user-select: text;
        }

        .search-box input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
        }

        .search-box button {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 10px;
        }

        .shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .shortcut-card {
            background: var(--card-bg);
            padding: 15px 10px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, border-color 0.2s, opacity 0.2s;
            border: 1px solid #333;
            cursor: grab;
            position: relative;
            touch-action: none; /* Cruciaal voor goede mobiele drag-and-drop */
        }

        .shortcut-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent-color);
        }

        .shortcut-card:active {
            cursor: grabbing;
        }

        .shortcut-card.dragging {
            opacity: 0.4;
            border: 1px dashed var(--accent-color);
            transform: scale(1.05);
        }

        .shortcut-card i {
            font-size: 1.6rem;
            color: var(--accent-color);
        }

        .shortcut-card span {
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        #add-shortcut-btn {
            cursor: pointer;
        }

        /* Context Menu (Desktop & Mobiel) */
        .context-menu {
            position: fixed;
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 1000;
            overflow: hidden;
            min-width: 150px;
        }

        .context-menu-item {
            padding: 12px 18px;
            font-size: 0.95rem;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s, color 0.2s;
        }

        .context-menu-item.edit-item:hover, .context-menu-item.edit-item:active {
            background: rgba(0, 255, 102, 0.15);
            color: rgba(0, 255, 102, 1);
        }

        .context-menu-item.delete-item:hover, .context-menu-item.delete-item:active {
            background: rgba(255, 51, 51, 0.15);
            color: var(--danger-color);
        }

        /* Modal / Popup */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
            padding: 10px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-box h3 {
            margin-bottom: 15px;
            font-size: 1.25rem;
            color: var(--accent-color);
        }

        .modal-box input {
            width: 100%;
            padding: 11px 14px;
            background: #121212;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 15px;
            outline: none;
            font-size: 0.95rem;
            user-select: text;
            -webkit-user-select: text;
            -moz-user-select: text;
        }

        .modal-box input:focus {
            border-color: var(--accent-color);
        }

        .icon-selector-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .icon-header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .icon-selector-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .icon-search-input {
            width: 55% !important;
            margin-bottom: 0 !important;
            padding: 6px 12px !important;
            font-size: 0.85rem !important;
            border-radius: 20px !important;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            background: #121212;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            max-height: 140px;
            overflow-y: auto;
        }

        .icon-grid::-webkit-scrollbar {
            width: 5px;
        }
        .icon-grid::-webkit-scrollbar-track {
            background: #121212;
        }
        .icon-grid::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .icon-option {
            background: var(--card-bg);
            border: 1px solid #444;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text-color);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-option.selected {
            border-color: var(--accent-color);
            color: var(--accent-color);
            box-shadow: 0 0 8px rgba(0, 255, 102, 0.3);
            background: rgba(0, 255, 102, 0.05);
        }

        .no-icons-msg {
            grid-column: span 6;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 15px 0;
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-buttons button {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-cancel {
            background: #333;
            color: #fff;
        }

        .btn-save {
            background: var(--accent-color);
            color: #121212;
        }

        /* Mobiele Responsive Aanpassingen */
        @media (max-width: 480px) {
            header {
                justify-content: center;
                width: 100%;
            }
            .header-widget {
                flex: 1;
                justify-content: center;
                font-size: 0.85rem;
                padding: 8px 12px;
            }
            h1 {
                font-size: 2rem;
                margin-top: 15px;
            }
            .icon-grid {
                grid-template-columns: repeat(5, 1fr);
            }
            .no-icons-msg {
                grid-column: span 5;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-widget" id="time-widget">
            <i class="fas fa-clock"></i>
            <span id="time-text">00:00:00</span>
        </div>
        <div class="header-widget" id="weather-widget">
            <i class="fas fa-cloud-sun"></i>
            <span id="weather-text">Weer laden...</span>
        </div>
    </header>

    <div class="container">
        <h1><span>TC_tam</span>Search</h1>

        <form action="https://www.google.com/search" method="GET" class="search-box">
            <input type="text" name="q" placeholder="Zoek op het web of typ een URL..." autocomplete="off" autofocus>
            <button type="submit"><i class="fas fa-search"></i></button>
        </form>

        <div class="shortcuts-grid" id="shortcuts-container">
            <div class="shortcut-card" id="add-shortcut-btn">
                <i class="fas fa-plus"></i>
                <span>Toevoegen</span>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="shortcut-modal">
        <div class="modal-box">
            <h3 id="modal-title">Snelkoppeling toevoegen</h3>
            <input type="text" id="shortcut-name" placeholder="Naam van de website" autocomplete="off">
            <input type="text" id="shortcut-url" placeholder="URL (bijv. github.com)" autocomplete="off">
            
            <div class="icon-selector-wrapper">
                <div class="icon-header-box">
                    <span class="icon-selector-label">Kies een icoon:</span>
                    <input type="text" id="icon-search" class="icon-search-input" placeholder="Zoek icoon..." autocomplete="off">
                </div>
                <div class="icon-grid" id="icon-picker-grid"></div>
            </div>

            <div class="modal-buttons">
                <button class="btn-cancel" id="modal-cancel">Annuleren</button>
                <button class="btn-save" id="modal-save">Toevoegen</button>
            </div>
        </div>
    </div>

    <div class="context-menu" id="custom-context-menu">
        <div class="context-menu-item edit-item" id="edit-context-item">
            <i class="fas fa-edit"></i> Bewerken
        </div>
        <div class="context-menu-item delete-item" id="delete-context-item">
            <i class="fas fa-trash-alt"></i> Verwijderen
        </div>
    </div>

    <script>
        // --- 1. Blokkeren van ContextMenu & Sneltoetsen ---
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            const isSelectAll = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'a';
            if (isSelectAll) {
                const activeEl = document.activeElement;
                if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) return;
                e.preventDefault();
            }
        });

        // --- 2. Live Klok Rechtsboven ---
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('nl-NL', { hour12: false });
            document.getElementById('time-text').innerText = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 3. Bibliotheek & Data ---
        const DEFAULT_SHORTCUTS = [
            { name: 'Maps', url: 'https://maps.google.com', icon: 'fas fa-map-marked-alt' },
            { name: 'YouTube', url: 'https://youtube.com', icon: 'fab fa-youtube' },
            { name: 'Drive', url: 'https://drive.google.com', icon: 'fab fa-google-drive' },
            { name: 'Gmail', url: 'https://gmail.com', icon: 'fas fa-envelope' }
        ];

        const ENTIRE_ICON_LIBRARY = [
            'fas fa-globe', 'fas fa-search', 'fas fa-link', 'fas fa-home', 'fas fa-compass', 'fas fa-star', 'fas fa-bookmark', 'fas fa-heart', 'fas fa-fire', 'fas fa-bolt', 'fas fa-eye', 'fas fa-bell', 'fas fa-flag', 'fas fa-thumbtack',
            'fab fa-youtube', 'fab fa-discord', 'fab fa-twitch', 'fab fa-twitter', 'fab fa-instagram', 'fab fa-tiktok', 'fab fa-whatsapp', 'fab fa-reddit', 'fab fa-github', 'fab fa-stack-overflow', 'fab fa-steam', 'fab fa-google', 'fab fa-facebook', 'fab fa-linkedin', 'fab fa-spotify', 'fab fa-apple', 'fab fa-android', 'fab fa-windows', 'fab fa-xbox', 'fab fa-playstation', 'fab fa-snapchat', 'fab fa-pinterest', 'fab fa-wikipedia-w', 'fab fa-vimeo-v', 'fab fa-soundcloud', 'fab fa-amazon',
            'fas fa-code', 'fas fa-terminal', 'fas fa-laptop-code', 'fas fa-database', 'fas fa-server', 'fas fa-bug', 'fas fa-file-code', 'fas fa-microchip', 'fas fa-network-wired', 'fas fa-cube', 'fas fa-layer-group',
            'fas fa-music', 'fas fa-headphones', 'fas fa-tv', 'fas fa-film', 'fas fa-gamepad', 'fas fa-play-circle', 'fas fa-pause-circle', 'fas fa-stop-circle', 'fas fa-volume-up', 'fas fa-volume-mute', 'fas fa-microphone', 'fas fa-camera', 'fas fa-video', 'fas fa-podcast', 'fas fa-sliders-h', 'fas fa-radio',
            'fab fa-google-drive', 'fas fa-map-marked-alt', 'fas fa-calendar-alt', 'fas fa-check-square', 'fas fa-folder-open', 'fas fa-file-alt', 'fas fa-envelope', 'fas fa-comment-alt', 'fas fa-users', 'fas fa-bullhorn', 'fas fa-paperclip', 'fas fa-trash-alt', 'fas fa-edit', 'fas fa-copy', 'fas fa-paste', 'fas fa-save', 'fas fa-print', 'fas fa-chart-bar', 'fas fa-chart-pie', 'fas fa-chart-line', 'fas fa-user', 'fas fa-user-shield', 'fas fa-lock', 'fas fa-key',
            'fas fa-book', 'fas fa-graduation-cap', 'fas fa-calculator', 'fas fa-lightbulb', 'fas fa-microscope', 'fas fa-atom', 'fas fa-brain', 'fas fa-compass-drafting', 'fas fa-flask', 'fas fa-school', 'fas fa-university',
            'fas fa-map-marker-alt', 'fas fa-car', 'fas fa-plane', 'fas fa-train', 'fas fa-bicycle', 'fas fa-rocket', 'fas fa-ship', 'fas fa-hotel', 'fas fa-store', 'fas fa-gas-pump', 'fas fa-suitcase',
            'fas fa-shopping-cart', 'fas fa-tools', 'fas fa-wrench', 'fas fa-hammer', 'fas fa-dumbbell', 'fas fa-trophy', 'fas fa-medal', 'fas fa-soccer-ball', 'fas fa-utensils', 'fas fa-coffee', 'fas fa-beer', 'fas fa-pizza-slice', 'fas fa-ice-cream', 'fas fa-palette', 'fas fa-brush', 'fas fa-ticket-alt',
            'fas fa-sun', 'fas fa-cloud', 'fas fa-cloud-showers-heavy', 'fas fa-snowflake', 'fas fa-wind', 'fas fa-umbrella', 'fas fa-tree', 'fas fa-leaf', 'fas fa-mountain', 'fas fa-water', 'fas fa-moon', 'fas fa-earth-europe',
            'fas fa-wallet', 'fas fa-credit-card', 'fas fa-money-bill-wave', 'fas fa-piggy-bank', 'fas fa-coins', 'fas fa-shopping-bag',
            'fas fa-info-circle', 'fas fa-question-circle', 'fas fa-exclamation-triangle', 'fas fa-check-circle', 'fas fa-times-circle', 'fas fa-plus-circle', 'fas fa-minus-circle', 'fas fa-briefcase-medical', 'fas fa-pills', 'fas fa-shield-alt', 'fas fa-gift', 'fas fa-crown', 'fas fa-gem'
        ];

        const shortcutsContainer = document.getElementById('shortcuts-container');
        const addBtn = document.getElementById('add-shortcut-btn');
        const shortcutModal = document.getElementById('shortcut-modal');
        const modalTitle = document.getElementById('modal-title');
        const shortcutNameInput = document.getElementById('shortcut-name');
        const shortcutUrlInput = document.getElementById('shortcut-url');
        const iconSearchInput = document.getElementById('icon-search');
        const iconPickerGrid = document.getElementById('icon-picker-grid');
        const modalCancelBtn = document.getElementById('modal-cancel');
        const modalSaveBtn = document.getElementById('modal-save');
        
        const contextMenu = document.getElementById('custom-context-menu');
        const editContextItem = document.getElementById('edit-context-item');
        const deleteContextItem = document.getElementById('delete-context-item');
        
        let activeShortcutIndex = null;
        let isEditMode = false;
        let selectedIconClass = ENTIRE_ICON_LIBRARY[0];
        let touchTimer = null; // Voor mobiele long-press detection

        function buildIconPicker(filterText = '') {
            iconPickerGrid.innerHTML = '';
            const searchTerms = filterText.toLowerCase().trim();
            
            const filteredIcons = ENTIRE_ICON_LIBRARY.filter(iconClass => {
                const clean = iconClass.toLowerCase().replace('fas ', '').replace('fab ', '').replace('fa-', '');
                return clean.includes(searchTerms);
            });

            if (filteredIcons.length === 0) {
                iconPickerGrid.innerHTML = `<div class="no-icons-msg">Geen iconen gevonden...</div>`;
                return;
            }

            filteredIcons.forEach(iconClass => {
                const div = document.createElement('div');
                div.className = `icon-option ${iconClass === selectedIconClass ? 'selected' : ''}`;
                div.innerHTML = `<i class="${iconClass}"></i>`;
                div.addEventListener('click', () => {
                    document.querySelectorAll('.icon-option').forEach(opt => opt.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedIconClass = iconClass;
                });
                iconPickerGrid.appendChild(div);
            });

            if (!searchTerms) {
                setTimeout(() => {
                    const selectedEl = iconPickerGrid.querySelector('.icon-option.selected');
                    if (selectedEl) selectedEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                }, 50);
            }
        }

        iconSearchInput.addEventListener('input', (e) => buildIconPicker(e.target.value));

        function getShortcuts() {
            let data = localStorage.getItem('customShortcuts');
            if (!data) {
                localStorage.setItem('customShortcuts', JSON.stringify(DEFAULT_SHORTCUTS));
                return DEFAULT_SHORTCUTS;
            }
            return JSON.parse(data);
        }

        function loadShortcuts() {
            document.querySelectorAll('.shortcut-card:not(#add-shortcut-btn)').forEach(el => el.remove());
            const list = getShortcuts();
            list.forEach((shortcut, index) => {
                createShortcutDOM(shortcut.name, shortcut.url, shortcut.icon, index);
            });
            initDragAndDrop();
        }

        function openCustomMenu(x, y, index) {
            activeShortcutIndex = index;
            contextMenu.style.top = `${y}px`;
            contextMenu.style.left = `${x}px`;
            contextMenu.style.display = 'block';
        }

        function createShortcutDOM(name, url, icon, index) {
            const a = document.createElement('a');
            a.href = url;
            a.className = 'shortcut-card';
            a.target = '_blank';
            a.dataset.index = index;
            
            a.innerHTML = `
                <i class="${icon || 'fas fa-globe'}"></i>
                <span>${name}</span>
            `;

            // Desktop rechtermuisknop
            a.addEventListener('contextmenu', (e) => {
                e.stopPropagation(); 
                e.preventDefault(); 
                openCustomMenu(e.clientX, e.clientY, index);
            });

            // Mobiele Long Press (0.5s inhouden opent menu)
            a.addEventListener('touchstart', (e) => {
                touchTimer = setTimeout(() => {
                    const touch = e.touches[0];
                    openCustomMenu(touch.clientX, touch.clientY, index);
                }, 500);
            }, { passive: true });

            a.addEventListener('touchend', () => clearTimeout(touchTimer));
            a.addEventListener('touchmove', () => clearTimeout(touchTimer));

            shortcutsContainer.insertBefore(a, addBtn);
        }

        // --- 4. Cross-Platform Drag and Drop (Muis & Touch) ---
        function initDragAndDrop() {
            const cards = document.querySelectorAll('.shortcut-card:not(#add-shortcut-btn)');
            
            cards.forEach(card => {
                // Muis Drag
                card.addEventListener('dragstart', () => card.classList.add('dragging'));
                card.addEventListener('dragend', () => {
                    card.classList.remove('dragging');
                    saveNewOrder();
                });

                // Mobiel Touch Drag
                card.addEventListener('touchmove', (e) => {
                    // Blokkeer menu-timer zodra er bewogen wordt
                    clearTimeout(touchTimer); 
                    
                    // Alleen slepen als het context-menu niet open staat
                    if (contextMenu.style.display === 'block') return;

                    card.classList.add('dragging');
                    const touch = e.touches[0];
                    
                    // Vind element onder de huidige vingerpositie
                    const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                    const afterElement = getDragAfterElement(shortcutsContainer, touch.clientX);
                    
                    if (afterElement == null) {
                        shortcutsContainer.insertBefore(card, addBtn);
                    } else {
                        shortcutsContainer.insertBefore(card, afterElement);
                    }
                }, { passive: false });

                card.addEventListener('touchend', () => {
                    if (card.classList.contains('dragging')) {
                        card.classList.remove('dragging');
                        saveNewOrder();
                    }
                });
            });

            // Desktop Drag Over container
            shortcutsContainer.addEventListener('dragover', (e) => {
                e.preventDefault();
                const draggingCard = document.querySelector('.dragging');
                if (!draggingCard) return;
                const afterElement = getDragAfterElement(shortcutsContainer, e.clientX);
                if (afterElement == null) {
                    shortcutsContainer.insertBefore(draggingCard, addBtn);
                } else {
                    shortcutsContainer.insertBefore(draggingCard, afterElement);
                }
            });
        }

        function getDragAfterElement(container, x) {
            const draggableElements = [...container.querySelectorAll('.shortcut-card:not(.dragging):not(#add-shortcut-btn)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = x - box.left - box.width / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function saveNewOrder() {
            const currentCards = [...shortcutsContainer.querySelectorAll('.shortcut-card:not(#add-shortcut-btn)')];
            const oldList = getShortcuts();
            const newList = currentCards.map(card => oldList[parseInt(card.dataset.index)]);
            localStorage.setItem('customShortcuts', JSON.stringify(newList));
            loadShortcuts(); 
        }

        // --- 5. Menu & Modal Event listeners ---
        editContextItem.addEventListener('click', () => {
            if (activeShortcutIndex !== null) {
                const list = getShortcuts();
                const shortcut = list[activeShortcutIndex];
                if (shortcut) {
                    isEditMode = true;
                    modalTitle.innerText = "Snelkoppeling bewerken";
                    modalSaveBtn.innerText = "Opslaan";
                    shortcutNameInput.value = shortcut.name;
                    shortcutUrlInput.value = shortcut.url;
                    iconSearchInput.value = '';
                    selectedIconClass = shortcut.icon || 'fas fa-globe';
                    buildIconPicker();
                    shortcutModal.classList.add('active');
                    shortcutNameInput.focus();
                }
                hideContextMenu();
            }
        });

        deleteContextItem.addEventListener('click', () => {
            if (activeShortcutIndex !== null) {
                let list = getShortcuts();
                list.splice(activeShortcutIndex, 1);
                localStorage.setItem('customShortcuts', JSON.stringify(list));
                loadShortcuts();
                hideContextMenu();
            }
        });

        document.addEventListener('click', () => hideContextMenu());
        document.addEventListener('touchstart', (e) => {
            if (!contextMenu.contains(e.target)) hideContextMenu();
        }, { passive: true });

        function hideContextMenu() { contextMenu.style.display = 'none'; }

        addBtn.addEventListener('click', () => {
            isEditMode = false;
            modalTitle.innerText = "Snelkoppeling toevoegen";
            modalSaveBtn.innerText = "Toevoegen";
            shortcutNameInput.value = '';
            shortcutUrlInput.value = '';
            iconSearchInput.value = '';
            selectedIconClass = ENTIRE_ICON_LIBRARY[0];
            buildIconPicker();
            shortcutModal.classList.add('active');
            shortcutNameInput.focus();
        });

        modalCancelBtn.addEventListener('click', () => shortcutModal.classList.remove('active'));

        modalSaveBtn.addEventListener('click', () => {
            const name = shortcutNameInput.value.trim();
            let url = shortcutUrlInput.value.trim();
            if (name && url) {
                if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
                let list = getShortcuts();
                if (isEditMode && activeShortcutIndex !== null) {
                    list[activeShortcutIndex] = { name, url, icon: selectedIconClass };
                } else {
                    list.push({ name, url, icon: selectedIconClass });
                }
                localStorage.setItem('customShortcuts', JSON.stringify(list));
                loadShortcuts();
                shortcutModal.classList.remove('active');
            }
        });

        shortcutModal.addEventListener('click', (e) => {
            if (e.target === shortcutModal) shortcutModal.classList.remove('active');
        });

        // --- 6. Weer API ---
        async function fetchWeather() {
            const weatherWidget = document.getElementById('weather-widget');
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=52.16&longitude=4.49&current_weather=true`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;

                let cond = "Bewolkt", icon = "fas fa-cloud";
                if (code === 0) { cond = "Onbewolkt"; icon = "fas fa-sun"; }
                else if (code >= 1 && code <= 3) { cond = "Licht bewolkt"; icon = "fas fa-cloud-sun"; }
                else if (code >= 61 && code <= 65) { cond = "Regen"; icon = "fas fa-cloud-showers-heavy"; }
                else if (code >= 71 && code <= 75) { cond = "Sneeuw"; icon = "fas fa-snowflake"; }
                else if (code >= 95) { cond = "Onweer"; icon = "fas fa-bolt"; }

                weatherWidget.innerHTML = `<i class="${icon}"></i> <span>Leiden: ${temp}°C</span>`;
            } catch {
                document.getElementById('weather-text').innerText = "Weer fout";
            }
        }

        // Init
        loadShortcuts();
        fetchWeather();
    </script>
</body>

</html>
