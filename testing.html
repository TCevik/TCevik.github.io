<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@100;200;300;400;500;600;700;800;900&display=swap');

        * {
            font-family: Lexend, Arial;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f0f0;
            overflow: hidden;
        }

        #grid {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }

        #add {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
            background-color: white;
            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 999;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            padding: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);

            /* Smooth animatie via max-height */
            height: auto; 
            min-height: 85px;
            max-height: 85px;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #add.open {
            max-height: 90%; 
        }

        #add-btn {
            width: 100%;
            background-color: #00ace7;
            border-radius: 100px;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            padding: 15px;
            transition: all 0.3s ease;
            z-index: 10;
        }

        #add-btn.close-style {
            background-color: #ff4d4d;
        }

        .menu-content {
            opacity: 0;
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-bottom: 20px;
            transition: opacity 0.3s ease;
        }

        #add.open .menu-content {
            opacity: 1;
            transition: opacity 0.5s ease 0.2s;
        }

        #camera-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            background-color: black;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 20px;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <div id="grid">
        <p id="empty-text">Oeps, het is nog een beetje leeg hier.</p>
    </div>

    <div id="add">
        <div class="menu-content">
            <h2 style="margin-top: 10px;">Scan Barcode</h2>
            <div id="camera-container">
                <video id="webcam" autoplay playsinline></video>
            </div>
            <p style="margin-top: 15px; color: #666;">Richt de camera op een streepjescode</p>
        </div>
        <button id="add-btn">Barcode toevoegen</button>
    </div>

    <script>
        const addDiv = document.getElementById('add');
        const addBtn = document.getElementById('add-btn');
        const video = document.getElementById('webcam');
        let stream = null;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Camera fout: ", err);
                alert("Kon de camera niet openen. Controleer je instellingen.");
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
        }

        addBtn.addEventListener('click', () => {
            const isOpen = addDiv.classList.toggle('open');
            
            if (isOpen) {
                addBtn.innerText = 'Sluiten';
                addBtn.classList.add('close-style');
                startCamera();
            } else {
                addBtn.innerText = 'Barcode toevoegen';
                addBtn.classList.remove('close-style');
                stopCamera();
            }
        });
    </script>
</body>

</html>
