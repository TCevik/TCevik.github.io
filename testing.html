<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Scanner Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap');

        * {
            font-family: Lexend, Arial;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f0f0;
            min-height: 100vh;
        }

        /* Grid Layout */
        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            padding: 20px;
            padding-bottom: 100px; /* Ruimte voor de knop */
        }

        #empty-text {
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 50px;
            color: #888;
        }

        .barcode-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            text-align: center;
            padding-bottom: 10px;
        }

        .barcode-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .barcode-card span {
            font-size: 14px;
            font-weight: 600;
            display: block;
            margin-top: 5px;
        }

        /* Scanner Menu */
        #add {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
            background-color: white;
            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 999;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            padding: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            height: auto; 
            min-height: 85px;
            max-height: 85px;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #add.open { max-height: 90%; }

        #add-btn {
            width: 100%;
            background-color: #00ace7;
            border-radius: 100px;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            padding: 15px;
            z-index: 10;
        }

        #add-btn.close-style { background-color: #ff4d4d; }

        .menu-content {
            opacity: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 20px;
        }

        #add.open .menu-content { opacity: 1; transition: 0.5s; }

        #camera-container {
            width: 100%;
            max-width: 300px;
            aspect-ratio: 1 / 1;
            background-color: black;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 20px;
            position: relative;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Modal / Detail Scherm */
        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #modal.active { display: flex; }

        #close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #eee;
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
        }

        #delete-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
        }

        #barcode-svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>

<body>

    <div id="grid">
        <p id="empty-text">Oeps, het is nog een beetje leeg hier.</p>
    </div>

    <div id="modal">
        <button id="delete-btn">Verwijderen</button>
        <button id="close-modal">X</button>
        <svg id="barcode-svg"></svg>
        <h2 id="modal-number" style="margin-top: 10px;"></h2>
    </div>

    <div id="add">
        <div class="menu-content">
            <h2 style="margin-top: 10px;">Scan Barcode</h2>
            <div id="camera-container">
                <video id="webcam" autoplay playsinline></video>
            </div>
            <p style="margin-top: 15px; color: #666;">Zoeken naar barcode...</p>
        </div>
        <button id="add-btn">Barcode toevoegen</button>
    </div>

    <canvas id="snapshot" style="display:none;"></canvas>

    <script>
        const addDiv = document.getElementById('add');
        const addBtn = document.getElementById('add-btn');
        const video = document.getElementById('webcam');
        const grid = document.getElementById('grid');
        const emptyText = document.getElementById('empty-text');
        const modal = document.getElementById('modal');
        
        let stream = null;
        let scanning = false;
        let barcodes = []; // Hier slaan we de data op
        let currentEditingId = null;

        // 1. Camera Starten & Scannen
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                scanning = true;
                scanLoop(); // Start de check loop
            } catch (err) {
                alert("Camera fout: " + err);
            }
        }

        function stopCamera() {
            scanning = false;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
        }

        // 2. De Scan Loop (gebruikt de native BarcodeDetector)
        async function scanLoop() {
            if (!scanning) return;

            // Check of de browser dit ondersteunt
            if (!('BarcodeDetector' in window)) {
                console.error("BarcodeDetector wordt niet ondersteund in deze browser.");
                return;
            }

            const detector = new BarcodeDetector();
            
            try {
                const detected = await detector.detect(video);
                if (detected.length > 0) {
                    const code = detected[0].rawValue;
                    addBarcode(code);
                    toggleMenu(); // Sluit menu na succes
                    return; // Stop met scannen
                }
            } catch (e) {}

            requestAnimationFrame(scanLoop);
        }

        // 3. Barcode Toevoegen aan Grid
        function addBarcode(code) {
            // Maak screenshot van video
            const canvas = document.getElementById('snapshot');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const screenshot = canvas.toDataURL('image/jpeg');

            const item = {
                id: Date.now(),
                code: code,
                image: screenshot
            };

            barcodes.push(item);
            renderGrid();
        }

        function renderGrid() {
            if (barcodes.length > 0) {
                emptyText.style.display = 'none';
            } else {
                emptyText.style.display = 'block';
            }

            // Verwijder oude items (behalve de tekst)
            const cards = document.querySelectorAll('.barcode-card');
            cards.forEach(c => c.remove());

            barcodes.forEach(item => {
                const card = document.createElement('div');
                card.className = 'barcode-card';
                card.innerHTML = `
                    <img src="${item.image}">
                    <span>${item.code}</span>
                `;
                card.onclick = () => openModal(item);
                grid.appendChild(card);
            });
        }

        // 4. Modal Functies
        function openModal(item) {
            currentEditingId = item.id;
            modal.classList.add('active');
            document.getElementById('modal-number').innerText = item.code;
            
            // Genereer de "echte" barcode afbeelding
            JsBarcode("#barcode-svg", item.code, {
                format: "CODE128",
                lineColor: "#000",
                width: 2,
                height: 100,
                displayValue: false
            });
        }

        document.getElementById('close-modal').onclick = () => modal.classList.remove('active');

        document.getElementById('delete-btn').onclick = () => {
            barcodes = barcodes.filter(b => b.id !== currentEditingId);
            modal.classList.remove('active');
            renderGrid();
        };

        function toggleMenu() {
            const isOpen = addDiv.classList.toggle('open');
            if (isOpen) {
                addBtn.innerText = 'Sluiten';
                addBtn.classList.add('close-style');
                startCamera();
            } else {
                addBtn.innerText = 'Barcode toevoegen';
                addBtn.classList.remove('close-style');
                stopCamera();
            }
        }

        addBtn.addEventListener('click', toggleMenu);
    </script>
</body>
</html>
