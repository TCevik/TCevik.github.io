<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamer's WebRTC Chat v2</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #e5ddd5; margin: 0; padding: 20px; height: 100vh; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); text-align: center; max-width: 450px; width: 100%; display: flex; flex-direction: column; height: 90vh; }
        
        #chat-section { display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }
        #messages { flex-grow: 1; border: 1px solid #ddd; padding: 15px; overflow-y: auto; border-radius: 10px; margin-bottom: 15px; background: #fff; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 85%; word-wrap: break-word; font-size: 15px; position: relative; }
        .msg.me { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.them { background: #fff; border: 1px solid #eee; align-self: flex-start; border-bottom-left-radius: 2px; }

        .input-group { display: flex; gap: 10px; padding-top: 10px; }
        input { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; font-size: 16px; }
        button { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); }

        #canvas { width: 220px !important; height: 220px !important; margin: 20px auto; border: 10px solid white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .status { color: #555; font-size: 14px; margin-bottom: 10px; font-weight: bold; }
        .hidden { display: none !important; }
        h2 { margin-top: 0; color: #075e54; }
    </style>
</head>
<body>

<div class="container">
    <h2>WhatsApp-stijl Chat</h2>
    <div id="status" class="status">ID aanmaken...</div>
    
    <div id="qr-section">
        <canvas id="canvas"></canvas>
        <p>Scan deze code met de andere telefoon</p>
    </div>

    <div id="chat-section" class="hidden">
        <div id="messages"></div>
        <div class="input-group">
            <input type="text" id="message-input" placeholder="Typ een bericht..." autocomplete="off">
            <button id="send-btn">Stuur</button>
        </div>
    </div>
</div>

<script>
    const statusEl = document.getElementById('status');
    const qrSection = document.getElementById('qr-section');
    const chatSection = document.getElementById('chat-section');
    const messagesEl = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    let conn; 
    const peer = new Peer(); // PeerJS server maakt automatisch verbinding

    // 1. Zodra je eigen ID klaar is
    peer.on('open', (id) => {
        statusEl.innerText = "Klaar voor verbinding";
        const currentUrl = window.location.href.split('?')[0];
        const joinUrl = currentUrl + "?join=" + id;
        
        QRCode.toCanvas(document.getElementById('canvas'), joinUrl, { width: 220 }, (err) => {
            if (err) console.error(err);
        });
    });

    // 2. Ontvangen van een verbinding (Jij bent de 'host')
    peer.on('connection', (connection) => {
        conn = connection;
        initConnection();
    });

    // 3. Zelf verbinding maken via URL (Jij bent de 'joiner')
    const urlParams = new URLSearchParams(window.location.search);
    const joinId = urlParams.get('join');
    if (joinId) {
        conn = peer.connect(joinId);
        initConnection();
    }

    // Luisteraars instellen voor de verbinding
    function initConnection() {
        // Zodra de verbinding ECHT open is
        conn.on('open', () => {
            qrSection.classList.add('hidden');
            chatSection.classList.remove('hidden');
            statusEl.innerText = "Verbonden met peer";
        });

        // Ontvangen van tekst
        conn.on('data', (data) => {
            addMessage(data, 'them');
        });

        conn.on('close', () => {
            statusEl.innerText = "Verbinding verbroken";
            chatSection.classList.add('hidden');
            qrSection.classList.remove('hidden');
        });

        conn.on('error', (err) => {
            console.error("Fout:", err);
            alert("Er ging iets mis met de verbinding.");
        });
    }

    // Versturen van tekst
    function sendMessage() {
        const msg = messageInput.value.trim();
        if (msg === "") return;

        if (conn && conn.open) {
            conn.send(msg);
            addMessage(msg, 'me');
            messageInput.value = "";
        } else {
            alert("Nog niet verbonden. Wacht tot de status 'Verbonden' is.");
        }
    }

    function addMessage(text, side) {
        const div = document.createElement('div');
        div.classList.add('msg', side);
        div.innerText = text;
        messagesEl.appendChild(div);
        
        // Automatisch naar beneden scrollen
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Event Listeners
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Algemene Peer fouten
    peer.on('error', (err) => {
        console.error("PeerJS Fout:", err.type);
        statusEl.innerText = "Fout: " + err.type;
    });
</script>

</body>
</html>
