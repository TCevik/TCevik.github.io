<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@100;200;300;400;500;600;700;800;900&display=swap');

        * {
            font-family: Lexend, Arial;
        }

        #grid {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 60px);
            width: 100%;
        }

        #empty-text {
            margin: 0;
            text-align: center;
        }

        #add {
            display: flex;
            justify-content: center;
            align-items: center;
            width: calc(100% - 20px);
            background-color: rgb(230, 230, 230);
            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 999;
            height: 60px;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            padding: 10px;
        }

        #add-btn {
            width: 100%;
            background-color: #00ace7;
            border-radius: 103px;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 10px;
        }
    </style>
</head>

<body>
    <div id="grid">
        <p id="empty-text">Oeps, het is nog een beetje leeg hier.</p>
    </div>
    <div id="add">
        <button id="add-btn">Barcode toevoegen</button>
    </div>
</body>

</html>
