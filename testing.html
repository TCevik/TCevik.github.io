<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamer's WebRTC Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        
        #chat-section { display: flex; flex-direction: column; height: 400px; text-align: left; }
        #messages { flex-grow: 1; border: 1px solid #ddd; padding: 10px; overflow-y: auto; border-radius: 10px; margin-bottom: 10px; background: #fafafa; }
        .msg { margin-bottom: 8px; padding: 5px 10px; border-radius: 5px; max-width: 80%; }
        .msg.me { background: #007bff; color: white; align-self: flex-end; margin-left: auto; }
        .msg.them { background: #e9e9eb; color: black; align-self: flex-start; }

        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; flex-grow: 1; }
        .input-group { display: flex; gap: 5px; }
        #canvas { width: 200px !important; height: 200px !important; margin: 20px auto; }
        .status { color: #666; font-size: 0.9em; margin: 10px 0; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>WebRTC Chat</h2>
    <p class="status" id="status">Peer ID genereren...</p>
    
    <div id="qr-section">
        <canvas id="canvas"></canvas>
        <p>Scan om te chatten</p>
    </div>

    <div id="chat-section" class="hidden">
        <div id="messages"></div>
        <div class="input-group">
            <input type="text" id="message-input" placeholder="Typ een bericht...">
            <button id="send-btn">Stuur</button>
        </div>
    </div>
</div>

<script>
    const statusEl = document.getElementById('status');
    const qrSection = document.getElementById('qr-section');
    const chatSection = document.getElementById('chat-section');
    const messagesEl = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    let conn; // De data connectie variabele
    const peer = new Peer(); 

    // 1. Peer openen en QR maken
    peer.on('open', (id) => {
        statusEl.innerText = "Jouw ID: " + id;
        const joinUrl = window.location.href.split('?')[0] + "?join=" + id;
        QRCode.toCanvas(document.getElementById('canvas'), joinUrl);
    });

    // 2. Ontvangen van een connectie (als iemand jouw QR scant)
    peer.on('connection', (connection) => {
        conn = connection;
        setupChat();
    });

    // 3. Zelf verbinding maken (als jij een QR hebt gescand)
    const urlParams = new URLSearchParams(window.location.search);
    const joinId = urlParams.get('join');
    if (joinId) {
        conn = peer.connect(joinId);
        setupChat();
    }

    function setupChat() {
        qrSection.classList.add('hidden');
        chatSection.classList.remove('hidden');
        statusEl.innerText = "Verbonden!";

        // Berichten ontvangen
        conn.on('data', (data) => {
            addMessage(data, 'them');
        });

        conn.on('open', () => {
            console.log("Connectie is open en klaar voor tekst.");
        });
    }

    // Bericht versturen
    function sendMessage() {
        const msg = messageInput.value;
        if (msg && conn && conn.open) {
            conn.send(msg);
            addMessage(msg, 'me');
            messageInput.value = "";
        }
    }

    function addMessage(text, side) {
        const div = document.createElement('div');
        div.classList.add('msg', side);
        div.innerText = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    peer.on('error', (err) => {
        console.error(err);
        statusEl.innerText = "Fout: " + err.type;
    });
</script>

</body>
</html>
