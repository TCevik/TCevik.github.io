<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TC_tamChat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    
    <style>
        /* Scrollbar en animaties */
        #chat-output::-webkit-scrollbar { width: 6px; }
        #chat-output::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .toast-leave { animation: fadeOut 0.3s ease-in forwards; }
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* Thema Variabelen (Light/Dark mode) */
        body { transition: background-color 0.3s, color 0.3s; background-color: #0f172a; color: white; }
        .light-mode { background-color: #f1f5f9; color: #0f172a; }
        .light-mode .bg-slate-900 { background-color: #ffffff !important; border-color: #e2e8f0; color: #0f172a; }
        .light-mode .bg-slate-800 { background-color: #f8fafc !important; border-color: #cbd5e1; color: #0f172a; }
        .light-mode .text-slate-400 { color: #64748b !important; }
        .light-mode .text-white { color: #0f172a !important; }
        .light-mode .text-slate-300 { color: #334155 !important; }
        .light-mode .bg-blue-600.text-white { color: #ffffff !important; } /* Uitzondering voor knoppen */
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col h-screen overflow-hidden">

<header class="bg-slate-900 p-4 shadow-md flex justify-between items-center z-10 border-b border-slate-800">
    <div>
        <h1 class="text-2xl font-bold text-blue-500 tracking-wide"><i class="fa-solid fa-masks-theater mr-2"></i>TC_tamChat</h1>
        <p id="subtitle-text" class="text-slate-400 text-xs mt-1">100% Gratis & Anoniem</p>
    </div>
    <div class="flex items-center gap-3">
        <div class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-800 text-blue-400 text-xs font-bold border border-slate-700">
            <i class="fa-solid fa-users"></i> <span id="online-count">1</span> Online
        </div>
        
        <button onclick="toggleTheme()" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-800 text-slate-300 hover:text-yellow-400 transition border border-slate-700">
            <i id="theme-icon" class="fa-solid fa-moon"></i>
        </button>

        <div class="flex bg-slate-800 p-1 rounded-lg border border-slate-700">
            <button id="lang-nl" onclick="changeLanguage('nl')" class="px-2 py-1 rounded-md text-xs font-bold transition bg-blue-600 text-white">NL</button>
            <button id="lang-en" onclick="changeLanguage('en')" class="px-2 py-1 rounded-md text-xs font-bold transition text-slate-400 hover:text-white">EN</button>
        </div>
        
        <div id="status-indicator" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-800 text-slate-300 text-sm font-medium border border-slate-700">
            <i class="fa-solid fa-power-off text-red-500"></i> <span id="status-text">Offline</span>
        </div>
    </div>
</header>

<div class="flex-1 flex flex-col md:flex-row w-full max-w-7xl mx-auto p-2 md:p-4 gap-4 overflow-hidden">
    
    <div class="flex-1 bg-black rounded-2xl overflow-hidden relative shadow-2xl flex flex-col items-center justify-center border border-slate-800">
        
        <div id="video-overlay" class="absolute inset-0 bg-slate-900 bg-opacity-90 flex flex-col items-center justify-center z-10 backdrop-blur-sm transition-opacity duration-300">
            <i id="overlay-icon" class="fa-solid fa-video text-6xl text-slate-600 mb-4"></i>
            <h2 id="overlay-text" class="text-xl font-medium text-slate-300">Klik op Start om te beginnen</h2>
            
            <button id="btn-start-init" onclick="startApp()" class="mt-6 bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-full font-bold text-lg shadow-lg shadow-blue-500/30 transition transform hover:scale-105">
                Start Camera & Zoek
            </button>
        </div>

        <video id="remote-video" class="w-full h-full object-cover" autoplay playsinline></video>
        <video id="local-video" class="w-28 h-40 md:w-40 md:h-56 absolute bottom-4 right-4 bg-slate-800 border-2 border-slate-600 rounded-xl shadow-2xl object-cover z-20 transition-transform transform hover:scale-105" autoplay playsinline muted></video>
        
        <button onclick="switchCamera()" class="absolute top-4 right-4 z-20 bg-slate-800 bg-opacity-70 text-white p-3 rounded-full hover:bg-opacity-100 transition border border-slate-600 md:hidden">
            <i class="fa-solid fa-camera-rotate"></i>
        </button>

        <div class="absolute bottom-4 left-4 z-20 flex gap-2">
            <button id="btn-next" onclick="nextStranger()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-3 rounded-xl font-bold shadow-lg transition hidden flex items-center gap-2">
                <i class="fa-solid fa-forward-step"></i> <span class="hidden md:inline">Volgende</span>
            </button>
            <button id="btn-report" onclick="reportAndNext()" class="bg-orange-600 hover:bg-orange-500 text-white px-4 py-3 rounded-xl font-bold shadow-lg transition hidden flex items-center gap-2" title="Rapporteer & Blokkeer">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </button>
            <button id="btn-stop" onclick="stopApp()" class="bg-red-600 hover:bg-red-500 text-white px-4 py-3 rounded-xl font-bold shadow-lg transition hidden">
                <i class="fa-solid fa-stop"></i>
            </button>
        </div>
    </div>

    <div class="w-full md:w-96 bg-slate-800 rounded-2xl flex flex-col border border-slate-700 shadow-xl overflow-hidden max-h-[40vh] md:max-h-full">
        <div class="bg-slate-900 p-3 border-b border-slate-700 font-medium text-slate-300 flex justify-between items-center">
            <span><i class="fa-solid fa-comments mr-2"></i><span id="chat-header-text">Chatbericht</span></span>
            <span id="chat-status" class="text-xs text-slate-500">Niet verbonden</span>
        </div>
        
        <div id="chat-output" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3 relative">
            <div class="text-center text-slate-500 text-sm italic mt-2">Systeem: Welkom bij TamerChat.</div>
        </div>
        
        <div id="typing-indicator" class="px-4 py-1 text-xs text-slate-500 italic hidden bg-slate-800">
            Vreemdeling typt...
        </div>

        <form id="chat-form" class="p-3 bg-slate-900 border-t border-slate-700 flex gap-2" onsubmit="sendMessage(event)">
            <input type="text" id="chat-input" class="flex-1 bg-slate-800 text-white placeholder-slate-400 px-4 py-2 rounded-xl border border-slate-700 focus:outline-none focus:border-blue-500 transition" placeholder="Typ een bericht..." disabled autocomplete="off">
            <button type="submit" id="btn-send" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
    </div>
</div>

<div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 flex flex-col gap-2 z-50 pointer-events-none"></div>

<script>
    // --- Variabelen ---
    let peer = null;
    let myPeerId = null;
    let currentConn = null;
    let currentCall = null;
    let localStream = null;
    
    // Camera settings
    let currentFacingMode = 'user';
    
    // Matchmaking Logica
    let isLooking = false;
    let searchInterval = null;
    let fallbackTimeout = null;
    let isFallback = false;
    let currentLang = 'nl'; 
    let typingTimeout;
    
    // MQTT Setup
    const mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
    const LOBBY_TOPIC = 'tamer-chat-lobby-global-2026';
    const PING_TOPIC = 'tamer-chat-ping-2026';
    
    // Online Users Tracking
    let onlineUsersMap = new Map();

    // Vertalingen overgeslagen in dit snippet om het kort te houden, zelfde als je origineel!
    const i18n = {
        nl: {
            subtitle: "100% Gratis & Anoniem", offline: "Offline", online: "Online",
            clickStart: "Klik op Start om te beginnen", btnStart: "Start Camera & Zoek",
            searching: "Zoeken naar een vreemdeling...", startingCamera: "Camera opstarten...",
            connectingServer: "Verbinden met server...", stopped: "Gestopt.",
            btnNext: "Volgende", btnStop: "Stop", chatHeader: "Chatbericht",
            chatStatusNotConnected: "Niet verbonden", chatStatusSearching: "Zoeken...", chatStatusConnected: "Verbonden!",
            sysWelcome: "Welkom bij TamerChat.", sysMatched: "Vreemdeling gevonden! Verbinden...",
            sysStartChat: "Je praat nu met een vreemdeling. Zeg hallo!", sysDisconnected: "Verbinding verbroken. Zoeken...",
            sysStopped: "App gestopt.", placeholder: "Typ een bericht...",
            senderMe: "Jij", senderStranger: "Vreemdeling", toastCameraDenied: "Camera/microfoon toegang geweigerd!",
            overlayCameraNeeded: "Camera nodig om te chatten"
        },
        en: {
            // (Engelse vertalingen hier)
            subtitle: "100% Free & Anonymous", offline: "Offline", online: "Online",
            clickStart: "Click Start to begin", btnStart: "Start Camera & Search",
            searching: "Searching for a stranger...", startingCamera: "Starting camera...",
            connectingServer: "Connecting to server...", stopped: "Stopped.",
            btnNext: "Next", btnStop: "Stop", chatHeader: "Chat Message",
            chatStatusNotConnected: "Not connected", chatStatusSearching: "Searching...", chatStatusConnected: "Connected!",
            sysWelcome: "Welcome to TamerChat.", sysMatched: "Stranger found! Connecting...",
            sysStartChat: "You are now chatting with a stranger. Say hi!", sysDisconnected: "Connection lost. Searching...",
            sysStopped: "App stopped.", placeholder: "Type a message...",
            senderMe: "You", senderStranger: "Stranger", toastCameraDenied: "Camera/microphone access denied!",
            overlayCameraNeeded: "Camera needed to chat"
        }
    };

    // --- UI Elementen ---
    const statusIndicator = document.getElementById('status-indicator');
    const statusText = document.getElementById('status-text');
    const overlay = document.getElementById('video-overlay');
    const overlayText = document.getElementById('overlay-text');
    const overlayIcon = document.getElementById('overlay-icon');
    const btnStartInit = document.getElementById('btn-start-init');
    const btnNext = document.getElementById('btn-next');
    const btnStop = document.getElementById('btn-stop');
    const btnReport = document.getElementById('btn-report');
    const remoteVideo = document.getElementById('remote-video');
    const localVideo = document.getElementById('local-video');
    const chatOutput = document.getElementById('chat-output');
    const chatInput = document.getElementById('chat-input');
    const btnSend = document.getElementById('btn-send');
    const chatStatus = document.getElementById('chat-status');
    const typingIndicator = document.getElementById('typing-indicator');
    const onlineCountDisplay = document.getElementById('online-count');

    // --- 1. Thema (Light/Dark Mode) ---
    window.toggleTheme = function() {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        document.getElementById('theme-icon').className = isLight ? "fa-solid fa-sun" : "fa-solid fa-moon";
    }

    // --- 2. Geluid (Web Audio API) ---
    // Dit maakt een professionele subtiele 'pop' zonder externe mp3 bestanden
    function playPopSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.5, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.1);
        } catch(e) { console.error("Audio API niet ondersteund", e); }
    }

    // --- 3. Typ-indicator Logica ---
    chatInput.addEventListener('input', () => {
        if (currentConn && currentConn.open) {
            currentConn.send({ type: 'typing', isTyping: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                if(currentConn && currentConn.open) currentConn.send({ type: 'typing', isTyping: false });
            }, 1500);
        }
    });

    // --- 4. Camera Switch (Mobiel) ---
    window.switchCamera = async function() {
        if (!localStream) return;
        currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
        
        try {
            // Stop huidige video track
            const oldTrack = localStream.getVideoTracks()[0];
            oldTrack.stop();
            
            // Vraag nieuwe track aan
            const newStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode }, 
                audio: true 
            });
            const newTrack = newStream.getVideoTracks()[0];
            
            // Vervang de track in de stream en in de peer connectie als die bestaat
            localStream.removeTrack(oldTrack);
            localStream.addTrack(newTrack);
            localVideo.srcObject = localStream;
            
            if (currentCall) {
                const sender = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                if (sender) sender.replaceTrack(newTrack);
            }
        } catch (err) {
            showToast("Camera switch mislukt.", "error");
        }
    }

    // --- 5. Rapporteer en Blokkeer Functie ---
    window.reportAndNext = function() {
        if (currentConn && currentConn.peer) {
            let blockedPeers = JSON.parse(localStorage.getItem('blocked_tc') || '[]');
            if (!blockedPeers.includes(currentConn.peer)) {
                blockedPeers.push(currentConn.peer);
                // Houd de lijst klein (max 100)
                if(blockedPeers.length > 100) blockedPeers.shift();
                localStorage.setItem('blocked_tc', JSON.stringify(blockedPeers));
            }
            showToast("Gebruiker is geblokkeerd", "warning");
        }
        nextStranger();
    }

    // --- Helpers (Taal, Toasts, etc.) ---
    window.changeLanguage = function(lang) {
        currentLang = lang;
        document.getElementById('lang-nl').className = `px-2 py-1 rounded-md text-xs font-bold transition ${lang === 'nl' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`;
        document.getElementById('lang-en').className = `px-2 py-1 rounded-md text-xs font-bold transition ${lang === 'en' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`;
        applyTranslations();
    }

    function applyTranslations() {
        const t = i18n[currentLang];
        document.getElementById('subtitle-text').innerText = t.subtitle;
        document.getElementById('chat-header-text').innerText = t.chatHeader;
        chatInput.placeholder = t.placeholder;
    }

    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        const bgColors = { 'success': 'bg-green-600', 'error': 'bg-red-600', 'info': 'bg-blue-600', 'warning': 'bg-orange-600' };
        toast.className = `${bgColors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm font-medium toast-enter pointer-events-auto max-w-xs`;
        toast.innerHTML = `<span>${message}</span>`;
        document.getElementById('toast-container').appendChild(toast);
        setTimeout(() => {
            toast.classList.replace('toast-enter', 'toast-leave');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    function setOverlay(show, text = "", icon = "fa-video", showBtn = false) {
        if(show) {
            overlay.classList.remove('hidden');
            overlayText.innerText = text;
            overlayIcon.className = `fa-solid ${icon} text-6xl text-slate-500 mb-4`;
            btnStartInit.style.display = showBtn ? 'block' : 'none';
        } else {
            overlay.classList.add('hidden');
        }
    }

    function addChatMessage(senderKey, text, isSystem = false) {
        const t = i18n[currentLang];
        const div = document.createElement('div');
        if (isSystem) {
            div.className = "text-center text-slate-500 text-xs font-medium my-1";
            div.innerText = `System: ${t[text] || text}`;
        } else {
            const isMe = senderKey === 'senderMe';
            const senderName = t[senderKey] || senderKey;
            div.className = `max-w-[85%] p-3 rounded-2xl text-sm shadow-sm ${isMe ? 'self-end bg-blue-600 text-white rounded-br-none' : 'self-start bg-slate-700 text-slate-200 rounded-bl-none'}`;
            div.innerHTML = `<strong class="block text-[10px] uppercase tracking-wider opacity-70 mb-1">${senderName}</strong>${text}`;
            
            // Speel geluidje af als de vreemdeling een bericht stuurt
            if (!isMe) playPopSound();
        }
        chatOutput.appendChild(div);
        chatOutput.scrollTop = chatOutput.scrollHeight;
    }

    // --- MQTT & Matchmaking ---
    mqttClient.on('connect', () => {
        mqttClient.subscribe(LOBBY_TOPIC);
        mqttClient.subscribe(PING_TOPIC);
        
        // --- 6. Online Gebruikers Ping Systeem ---
        setInterval(() => {
            if(myPeerId) mqttClient.publish(PING_TOPIC, JSON.stringify({ id: myPeerId }));
            
            // Ruim oude gebruikers op (wie na 15 seconden niks stuurt is offline)
            const now = Date.now();
            for(let [id, time] of onlineUsersMap.entries()) {
                if(now - time > 15000) onlineUsersMap.delete(id);
            }
            // Zorg dat het nooit onder de 1 komt als jij zelf online bent
            onlineCountDisplay.innerText = Math.max(1, onlineUsersMap.size);
        }, 5000);
    });

    mqttClient.on('message', (topic, message) => {
        try {
            const data = JSON.parse(message.toString());
            
            // Ontvang Online Ping
            if (topic === PING_TOPIC) {
                onlineUsersMap.set(data.id, Date.now());
                return;
            }

            // Ontvang Matchmaking Verzoek
            if (topic === LOBBY_TOPIC && isLooking && data.id && data.id !== myPeerId) {
                
                // Check of deze persoon in onze blokkeerlijst staat
                const blockedPeers = JSON.parse(localStorage.getItem('blocked_tc') || '[]');
                if (blockedPeers.includes(data.id)) return; // Negeer direct

                const langMatches = (data.lang === currentLang);
                if (langMatches || (isFallback && data.fallback)) {
                    isLooking = false;
                    clearInterval(searchInterval);
                    if (fallbackTimeout) clearTimeout(fallbackTimeout);
                    addChatMessage("System", "sysMatched", true);
                    
                    if (myPeerId > data.id) {
                        connectToStranger(data.id);
                    } else {
                        setTimeout(() => { if (!currentConn && !currentCall) startMatchmaking(); }, 5000);
                    }
                }
            }
        } catch(e) {}
    });

    function startMatchmaking() {
        if (!myPeerId) return;
        isLooking = true;
        isFallback = false;
        typingIndicator.classList.add('hidden');
        setOverlay(true, i18n[currentLang].searching, "fa-globe fa-spin");
        
        if (fallbackTimeout) clearTimeout(fallbackTimeout);
        fallbackTimeout = setTimeout(() => { if (isLooking) isFallback = true; }, 7000);

        if(searchInterval) clearInterval(searchInterval);
        searchInterval = setInterval(() => {
            if(isLooking) mqttClient.publish(LOBBY_TOPIC, JSON.stringify({ id: myPeerId, lang: currentLang, fallback: isFallback }));
        }, 2000);
    }

    // --- Hoofd App Logica ---
    window.startApp = async function() {
        const t = i18n[currentLang];
        try {
            setOverlay(true, t.startingCamera, "fa-camera fa-fade");
            localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: true });
            localVideo.srcObject = localStream;
            
            setOverlay(true, t.connectingServer, "fa-network-wired fa-fade");
            peer = new Peer(); 
            
            peer.on('open', (id) => {
                myPeerId = id;
                document.getElementById('status-text').innerText = t.online;
                document.getElementById('status-indicator').querySelector('i').className = "fa-solid fa-circle text-green-500";
                
                btnNext.classList.remove('hidden');
                btnStop.classList.remove('hidden');
                btnReport.classList.remove('hidden'); // Laat report knop zien
                startMatchmaking();
            });

            peer.on('connection', (conn) => { isLooking = false; clearInterval(searchInterval); setupDataConnection(conn); });
            peer.on('call', (call) => { isLooking = false; clearInterval(searchInterval); call.answer(localStream); setupMediaCall(call); });
            peer.on('error', (err) => { if (err.type === 'peer-unavailable') startMatchmaking(); });
        } catch(err) {
            showToast(t.toastCameraDenied, "error");
            setOverlay(true, t.overlayCameraNeeded, "fa-camera-slash text-red-500", true);
        }
    }

    function connectToStranger(strangerId) {
        const conn = peer.connect(strangerId);
        setupDataConnection(conn);
        const call = peer.call(strangerId, localStream);
        setupMediaCall(call);
    }

    function setupDataConnection(conn) {
        currentConn = conn;
        conn.on('open', () => {
            setOverlay(false);
            chatInput.disabled = false;
            btnSend.disabled = false;
            addChatMessage("System", "sysStartChat", true);
        });

        conn.on('data', (data) => {
            if (data.type === 'text') {
                typingIndicator.classList.add('hidden'); // Verberg typ indicator als bericht binnenkomt
                addChatMessage("senderStranger", data.message);
            } else if (data.type === 'typing') {
                // Toon of verberg typ-indicator
                typingIndicator.classList.toggle('hidden', !data.isTyping);
                chatOutput.scrollTop = chatOutput.scrollHeight;
            }
        });
        conn.on('close', () => handleDisconnect());
    }

    function setupMediaCall(call) {
        currentCall = call;
        call.on('stream', (remoteStream) => { remoteVideo.srcObject = remoteStream; setOverlay(false); });
        call.on('close', () => handleDisconnect());
    }

    function handleDisconnect() {
        if (!currentConn && !currentCall) return;
        addChatMessage("System", "sysDisconnected", true);
        typingIndicator.classList.add('hidden');
        currentConn = null;
        currentCall = null;
        nextStranger();
    }

    window.sendMessage = function(e) {
        e.preventDefault();
        const msg = chatInput.value.trim();
        if (msg && currentConn && currentConn.open) {
            currentConn.send({ type: 'text', message: msg });
            // Stop typing status direct na verzenden
            currentConn.send({ type: 'typing', isTyping: false });
            clearTimeout(typingTimeout);
            
            addChatMessage("senderMe", msg);
            chatInput.value = '';
        }
    }

    window.nextStranger = function() {
        if (currentConn) { currentConn.close(); currentConn = null; }
        if (currentCall) { currentCall.close(); currentCall = null; }
        if (fallbackTimeout) clearTimeout(fallbackTimeout);
        remoteVideo.srcObject = null;
        chatInput.disabled = true;
        btnSend.disabled = true;
        typingIndicator.classList.add('hidden');
        chatOutput.innerHTML = '';
        startMatchmaking();
    }

    window.stopApp = function() {
        isLooking = false;
        if (searchInterval) clearInterval(searchInterval);
        if (fallbackTimeout) clearTimeout(fallbackTimeout);
        if (currentConn) currentConn.close();
        if (currentCall) currentCall.close();
        if (localStream) localStream.getTracks().forEach(track => track.stop());
        if (peer) peer.destroy();
        
        currentConn = null; currentCall = null; localStream = null; peer = null;
        
        document.getElementById('status-text').innerText = "Offline";
        document.getElementById('status-indicator').querySelector('i').className = "fa-solid fa-power-off text-red-500";
        setOverlay(true, "Gestopt.", "fa-stop", true);
        btnNext.classList.add('hidden');
        btnStop.classList.add('hidden');
        btnReport.classList.add('hidden');
        chatOutput.innerHTML = '';
        typingIndicator.classList.add('hidden');
    }
    
    applyTranslations();
</script>
</body>
</html>
